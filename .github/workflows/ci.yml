name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: anufit

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build

      - name: Analyze
        run: flutter analyze

      - name: Run unit tests
        run: flutter test

  build-android:
    runs-on: ubuntu-latest
    needs: analyze-and-test
    defaults:
      run:
        working-directory: anufit

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Build APK
        run: |
          flutter pub get
          dart run build_runner build
          flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: anufit/build/app/outputs/flutter-apk/app-release.apk
