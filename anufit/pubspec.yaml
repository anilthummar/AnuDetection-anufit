name: anufit
description: "Production-grade Flutter Health & Step Tracker."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Foundation
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7
  get_it: ^8.0.3
  injectable: ^2.5.0
  go_router: ^15.1.2
  flutter_dotenv: ^5.2.1
  logger: ^2.5.0

  # Storage
  isar_community: 3.3.2
  isar_community_flutter_libs: 3.3.2
  shared_preferences: ^2.5.3
  path_provider: ^2.1.5

  # Utilities
  permission_handler: ^11.4.0
  package_info_plus: ^8.3.0
  rxdart: ^0.28.0
  fl_chart: ^0.70.2
  intl: ^0.20.2
  flutter_local_notifications: ^19.0.0
  timezone: ^0.10.0
  share_plus: ^10.1.4
  pdf: ^3.11.3
  excel: ^4.0.6
  health: ^12.0.0
  flutter_secure_storage: ^9.2.4
  encrypt: ^5.0.3
  home_widget: ^0.7.0
  webview_flutter: ^4.13.0
  file_picker: ^8.1.7
  crypto: ^3.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  injectable_generator: ^2.7.0
  isar_community_generator: 3.3.2
  pigeon: ^26.1.5
  mocktail: ^1.0.4
  bloc_test: ^10.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/app_logo.png
  adaptive_icon_background: "#09AA6C"
  adaptive_icon_foreground: assets/images/app_icon_foreground.png
  remove_alpha_ios: true

flutter_native_splash:
  color: "#09AA6C"
  image: assets/images/app_icon_foreground.png
  android_gravity: center
  ios_content_mode: center
  android_12:
    color: "#09AA6C"
    image: assets/images/app_icon_foreground.png
  web: false

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/images/app_logo.png
    - assets/images/app_icon_foreground.png
    - assets/icons/
    - assets/animations/
    - assets/lottie/
    - assets/svg/
    - assets/translations/
    - assets/json/
    - assets/legal/
    - .env.production
